<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave | SLMS</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:40px 20px;
            overflow-y:auto;
            overflow-x:hidden;
            position:relative;
        }

        /* Background Blur Effects */

        body::before,
        body::after{
            content:"";
            position:fixed;
            border-radius:50%;
            filter:blur(100px);
            opacity:.35;
            z-index:-1;
        }

        body::before{
            width:320px;
            height:320px;
            background:#60a5fa;
            top:-120px;
            left:-100px;
        }

        body::after{
            width:360px;
            height:360px;
            background:#3b82f6;
            bottom:-120px;
            right:-100px;
        }

        .container{
            width:100%;
            max-width:560px;
            margin:30px auto;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:22px;
            padding:40px;
            box-shadow:0 20px 45px rgba(0,0,0,.35);
            animation:fadeUp .7s ease;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .logo{
            width:80px;
            height:80px;
            border-radius:50%;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:30px;
            font-weight:bold;
            margin:0 auto 20px;
            box-shadow:0 10px 25px rgba(37,99,235,.45);
        }

        h2{
            color:#fff;
            text-align:center;
            margin-bottom:8px;
            font-size:32px;
        }

        .subtitle{
            text-align:center;
            color:#dbeafe;
            margin-bottom:35px;
            font-size:16px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        label{
            color:#fff;
            font-weight:600;
            margin-bottom:8px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:14px 16px;
            border:none;
            outline:none;
            border-radius:10px;
            margin-bottom:22px;
            background:rgba(255,255,255,.18);
            color:#fff;
            font-size:15px;
            transition:.3s;
        }

        input::placeholder,
        textarea::placeholder{
            color:#dbeafe;
        }

        input:focus,
        select:focus,
        textarea:focus{
            background:rgba(255,255,255,.25);
            box-shadow:0 0 0 3px rgba(255,255,255,.2);
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        input[type="date"]{
            color:#fff;
        }

        select option{
            color:#000;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#fff;
            color:#1d4ed8;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#dbeafe;
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(255,255,255,.25);
        }

        .back{
            margin-top:25px;
            text-align:center;
        }

        .back a{
            color:#fff;
            text-decoration:none;
            font-weight:600;
            transition:.3s;
        }

        .back a:hover{
            color:#dbeafe;
            text-decoration:underline;
        }

        @media(max-width:600px){

            body{
                padding:20px 15px;
            }

            .container{
                padding:28px 22px;
                margin:20px auto;
            }

            h2{
                font-size:28px;
            }

            .subtitle{
                font-size:15px;
            }

        }

    </style>

</head>
<body>

<div class="container">

    <div class="logo">
        SL
    </div>

    <h2>Apply for Leave</h2>

    <p class="subtitle">
        Submit your leave request quickly and securely.
    </p>

    <form method="POST">

        {% csrf_token %}

        <label>Leave Type</label>

        <select name="leave_type" required>

            <option value="">Choose Leave Type</option>
            <option value="sick">Sick Leave</option>
            <option value="vacation">Vacation Leave</option>
            <option value="other">Other</option>

        </select>

        <label>Start Date</label>

        <input type="date" name="start_date" required>

        <label>End Date</label>

        <input type="date" name="end_date" required>

        <label>Reason</label>

        <textarea
            name="reason"
            rows="5"
            placeholder="Enter your reason for leave..."
            required></textarea>

        <button type="submit">
            Submit Leave Application
        </button>

    </form>

    <div class="back">

        <a href="javascript:history.back()">
            ← Back
        </a>

    </div>

</div>

</body>
</html>
