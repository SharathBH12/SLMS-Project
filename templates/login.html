<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLMS Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
            overflow:hidden;
            position:relative;
        }

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:.35;
        }

        body::before{
            width:320px;
            height:320px;
            background:#60a5fa;
            top:-120px;
            left:-80px;
        }

        body::after{
            width:350px;
            height:350px;
            background:#3b82f6;
            bottom:-120px;
            right:-80px;
        }

        .container{
            width:420px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            box-shadow:0 20px 40px rgba(0,0,0,.35);
            animation:fadeUp .8s ease;
            z-index:1;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            width:80px;
            height:80px;
            margin:auto;
            margin-bottom:20px;
            border-radius:50%;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            display:flex;
            justify-content:center;
            align-items:center;
            color:#fff;
            font-size:30px;
            font-weight:bold;
            box-shadow:0 10px 25px rgba(37,99,235,.4);
        }

        h1{
            text-align:center;
            color:#fff;
            margin-bottom:8px;
            font-size:30px;
        }

        h2{
            text-align:center;
            color:#dbeafe;
            font-size:16px;
            font-weight:400;
            margin-bottom:30px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        label{
            color:#fff;
            font-weight:600;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:none;
            outline:none;
            border-radius:10px;
            background:rgba(255,255,255,.18);
            color:#fff;
            font-size:15px;
            transition:.3s;
        }

        input::placeholder{
            color:#dbeafe;
        }

        input:focus{
            background:rgba(255,255,255,.25);
            box-shadow:0 0 0 3px rgba(255,255,255,.2);
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:#fff;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1e40af;
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(37,99,235,.35);
        }

        .links{
            text-align:center;
            margin-top:25px;
        }

        .links p{
            color:#dbeafe;
            margin:12px 0;
        }

        .links a{
            color:#fff;
            text-decoration:none;
            font-weight:600;
        }

        .links a:hover{
            text-decoration:underline;
        }

        @media(max-width:500px){

            .container{
                width:90%;
                padding:30px;
            }

            h1{
                font-size:26px;
            }

        }

    </style>

</head>
<body>

    <div class="container">

        <div class="logo">SL</div>

        <h1>Welcome Back</h1>
        <h2>Staff Leave Management System</h2>

        <form method="post">

            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>

        </form>

        <div class="links">

            <p>
                Don't have an account?
                <a href="/register/">Register</a>
            </p>

            <p>
                <a href="/">← Back to Home</a>
            </p>

        </div>

    </div>

</body>
</html>
