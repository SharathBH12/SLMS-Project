<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff | SLMS</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
            padding:40px 20px;
            position:relative;
            overflow-x:auto;
        }

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:.35;
            z-index:-1;
        }

        body::before{
            width:320px;
            height:320px;
            background:#60a5fa;
            top:-120px;
            left:-80px;
        }

        body::after{
            width:360px;
            height:360px;
            background:#3b82f6;
            bottom:-120px;
            right:-100px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:20px;
            padding:35px;
            box-shadow:0 20px 45px rgba(0,0,0,.35);
            animation:fadeUp .7s ease;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        h1{
            text-align:center;
            color:#fff;
            margin-bottom:30px;
            font-size:34px;
        }

        .top-actions{
            display:flex;
            justify-content:flex-end;
            margin-bottom:25px;
        }

        .table-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:650px;
        }

        thead th{
            background:#2563eb;
            color:#fff;
            padding:16px;
            font-size:16px;
        }

        tbody td{
            padding:16px;
            text-align:center;
            color:#fff;
            background:rgba(255,255,255,.08);
            border-bottom:1px solid rgba(255,255,255,.12);
        }

        tbody tr:hover td{
            background:rgba(255,255,255,.15);
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            font-size:14px;
            font-weight:600;
            margin:3px;
            transition:.3s;
        }

        .add-btn{
            background:#16a34a;
        }

        .add-btn:hover{
            background:#15803d;
            transform:translateY(-2px);
        }

        .edit-btn{
            background:#2563eb;
        }

        .edit-btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .delete-btn{
            background:#dc2626;
        }

        .delete-btn:hover{
            background:#b91c1c;
            transform:translateY(-2px);
        }

        .empty-row td{
            color:#ffd4d4;
            font-size:18px;
            font-weight:bold;
            padding:30px;
        }

        .footer{
            text-align:center;
            margin-top:35px;
        }

        .back-btn{
            display:inline-block;
            text-decoration:none;
            background:#fff;
            color:#1d4ed8;
            padding:14px 28px;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
        }

        .back-btn:hover{
            background:#dbeafe;
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(255,255,255,.25);
        }

        @media(max-width:768px){

            .container{
                padding:25px;
            }

            h1{
                font-size:28px;
            }

            .top-actions{
                justify-content:center;
            }

        }

    </style>

</head>
<body>

<div class="container">

    <h1>👥 Manage Staff</h1>

    <div class="top-actions">

        <a href="{% url 'add_staff' %}" class="btn add-btn">

            + Add Staff

        </a>

    </div>

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>Username</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                {% for i in staff_list %}

                <tr>

                    <td>{{ i.username }}</td>

                    <td>

                        <a href="{% url 'edit_staff' i.id %}" class="btn edit-btn">

                            ✏ Edit

                        </a>

                        <a href="{% url 'delete_staff' i.id %}"
                           class="btn delete-btn"
                           onclick="return confirm('Are you sure you want to delete this staff member?')">

                            🗑 Delete

                        </a>

                    </td>

                </tr>

                {% empty %}

                <tr class="empty-row">

                    <td colspan="2">

                        No staff members found.

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    <div class="footer">

        <a href="{% url 'admin_dashboard' %}" class="back-btn">

            ← Back to Dashboard

        </a>

    </div>

</div>

</body>
</html>
